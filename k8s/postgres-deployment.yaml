apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:16

        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: employee-db-secret
              key: DB_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: employee-db-secret
              key: DB_PASSWORD

        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: employee-db-secret
              key: DB_NAME

        # مهم جداً لتجنب مشكلة lost+found
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

        # ده اللي بيحل مشكلة Permission Denied
        securityContext:
          fsGroup: 1014580000

      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

